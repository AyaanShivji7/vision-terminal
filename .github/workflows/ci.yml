name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest

    # Dummy env values so `next build` can collect page data without a
    # real Neon / Clerk / Finnhub setup. These are never used at runtime.
    env:
      DATABASE_URL: "postgres://fake:fake@localhost/fake"
      CLERK_SECRET_KEY: "dummy"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
      OPENAI_API_KEY: "sk-dummy"
      FINNHUB_API_KEY: "dummy"
      SNAPTRADE_CLIENT_ID: "dummy"
      SNAPTRADE_CONSUMER_KEY: "dummy"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      CRON_SECRET: "dummy"
      ADMIN_USER_IDS: "user_ci"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
